name: Update Summary

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/metadata.json'
      - '.github/workflows/update-summary.yml'

  schedule:
    - cron: "0 3 * * *"   # optional: rebuild daily at 03:00 UTC

jobs:
  build-summary:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Clone all linked repos
        run: |
          echo "Listing current directory:$(pwd)"
          ls -l .

          mkdir ../repos
          while read repo; do
            echo "Cloning $repo into ..."
            git clone "$repo" "../repos/$(basename $repo)" || true
          done < ./repo-list.txt
          
          echo "Listing repos directory:"
          ls -l ../repos/

      - name: Generate summary.md
        run: |
          echo "Listing repos metadata.json:"
          ls -l ../repos/*/metadata.json

          echo "# Security Research Summary" > summary.md
          echo "Unified Index of CVEs and Security Findings" >> summary.md
          echo "Maintained by: **gregk4sec** (https://github.com/gregk4sec/cve)" >> summary.md
          echo "" >> summary.md
          echo "---" >> summary.md
          echo "" >> summary.md
          echo "## Summary Table" >> summary.md
          echo "" >> summary.md
          echo "| Index | Type | ID / Case | Title | Severity | Vendor | Year | Status | Repository |" >> summary.md
          echo "|-------|------|-----------|--------|----------|--------|-------|---------|------------|" >> summary.md

          index=1
          for dir in ../repos/*; do
            echo "repo dir:$dir"
            if [ -f "$dir/metadata.json" ]; then
              meta="$dir/metadata.json"
              echo "$meta content:"
              cat "$meta"
              echo "$meta EOF"
              type=$(jq -r '.type // "CVE"' "$meta")
              id=$(jq -r '.cve // .case_id // "N/A"' "$meta")
              title=$(jq -r '.title' "$meta")
              vendor=$(jq -r '.vendor' "$meta")
              product=$(jq -r '.product' "$meta")
              severity=$(jq -r '.severity' "$meta")
              status=$(jq -r '.status' "$meta")
              year=$(jq -r '.cve | split("-")[1] // "N/A"' "$meta")
              repo_url=$(jq -r '.repository // "Private"' "$meta")

              printf -v hex "0x%02X" $index

              echo "| $hex | $type | $id | $title | $severity | $vendor | $year | $status | $repo_url |" >> summary.md

              index=$((index+1))
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add summary.md
          git commit -m "Auto-update summary.md" || echo "No changes"
          git push
